name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build da imagem
        run: |
          docker build -t ${{ secrets.DOCKERHUB_REPO }}:app_mantec2.0 .

      - name: Push para Docker Hub
        run: |
          docker push ${{ secrets.DOCKERHUB_REPO }}:app_mantec2.0

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_REPO }}:app_mantec2.0

            docker service update \
              --image ${{ secrets.DOCKERHUB_REPO }}:app_mantec2.0 \
              --force app_mantec2.0 || \
            docker service create \
              --name app_mantec2.0 \
              --publish 5004:5004 \
              ${{ secrets.DOCKERHUB_REPO }}:app_mantec2.0
